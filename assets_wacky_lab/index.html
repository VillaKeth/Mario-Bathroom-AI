<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wacky Mario Remix Lab</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #10121a;
      color: #e9edf9;
      font-family: Arial, sans-serif;
    }
    h1 {
      margin: 0 0 8px 0;
      color: #ff6f6f;
    }
    .subtitle {
      margin: 0 0 16px 0;
      color: #b8c2dd;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
      gap: 14px;
    }
    .card {
      background: #1a2030;
      border: 1px solid #2c3653;
      border-radius: 10px;
      padding: 12px;
    }
    .card h2 {
      margin: 0 0 10px 0;
      color: #91d5ff;
      font-size: 18px;
    }
    .row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      overflow-x: auto;
    }
    img {
      max-width: 180px;
      height: auto;
      border-radius: 6px;
      border: 1px solid #2c3653;
      background: #070910;
      padding: 2px;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <h1>Wacky Mario Remix Lab</h1>
  <p class="subtitle">Remixed from local mario_assets using 10 transformation effects per source.</p>
  <div class="grid">
<div class="card">
  <h2>mario.png</h2>
  <div class="row">
    <img src="source_mario/original.png" alt="mario.png original">
    <img src="source_mario/neon_pop.png" alt="mario.png neon pop">
    <img src="source_mario/rgb_ghost.png" alt="mario.png rgb ghost">
    <img src="source_mario/kaleido_mirror.png" alt="mario.png kaleido">
  </div>
</div>

<div class="card">
  <h2>dcpb2k5-fccc921c-3d4e-47dc-845b-1361bb1c5fab.png</h2>
  <div class="row">
    <img src="source_dcpb2k5_fccc921c_3d4e_47dc_845b_1361bb1c5fab/original.png" alt="dcpb2k5-fccc921c-3d4e-47dc-845b-1361bb1c5fab.png original">
    <img src="source_dcpb2k5_fccc921c_3d4e_47dc_845b_1361bb1c5fab/neon_pop.png" alt="dcpb2k5-fccc921c-3d4e-47dc-845b-1361bb1c5fab.png neon pop">
    <img src="source_dcpb2k5_fccc921c_3d4e_47dc_845b_1361bb1c5fab/rgb_ghost.png" alt="dcpb2k5-fccc921c-3d4e-47dc-845b-1361bb1c5fab.png rgb ghost">
    <img src="source_dcpb2k5_fccc921c_3d4e_47dc_845b_1361bb1c5fab/kaleido_mirror.png" alt="dcpb2k5-fccc921c-3d4e-47dc-845b-1361bb1c5fab.png kaleido">
  </div>
</div>

<div class="card">
  <h2>t4p5ims9enlc1.png</h2>
  <div class="row">
    <img src="source_t4p5ims9enlc1/original.png" alt="t4p5ims9enlc1.png original">
    <img src="source_t4p5ims9enlc1/neon_pop.png" alt="t4p5ims9enlc1.png neon pop">
    <img src="source_t4p5ims9enlc1/rgb_ghost.png" alt="t4p5ims9enlc1.png rgb ghost">
    <img src="source_t4p5ims9enlc1/kaleido_mirror.png" alt="t4p5ims9enlc1.png kaleido">
  </div>
</div>
</div>
</body>
</html>
